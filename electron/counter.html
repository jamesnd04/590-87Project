<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: rgba(0, 0, 0, 0);
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .card {
        width: 320px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        padding: 18px;
        background: rgba(17, 24, 39, 0.45);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        text-align: center;
      }
      .label {
        font-size: 14px;
        color: rgba(229, 231, 235, 0.75);
        margin-bottom: 8px;
      }
      .value {
        font-size: 48px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .controls {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: #e5e7eb;
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.11);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="label">Electron Counter</div>
      <div id="count" class="value">0</div>
      <div class="controls">
        <button id="inc" type="button">+1</button>
        <button id="quit" type="button">Quit</button>
      </div>
    </div>

    <script>
      const countEl = document.getElementById("count");
      const incBtn = document.getElementById("inc");
      const quitBtn = document.getElementById("quit");

      let count = 0;

      function render() {
        countEl.textContent = String(count);
      }

      incBtn.addEventListener("click", () => {
        count += 1;
        render();
      });

      quitBtn.addEventListener("click", () => {
        // Exposed by electron/preload.ts
        window.ipc?.quit?.();
      });

      // Optional: automatically tick once per second.
      setInterval(() => {
        count += 1;
        render();
      }, 1000);

      render();
    </script>
  </body>
</html>
